<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Play Game | NodeNomad</title>
    <style>
        :root {
            --bg-color: #0d1117;
            --card-bg: #161b22;
            --text-main: #c9d1d9;
            --neon-blue: #58a6ff;
            --neon-green: #3fb950;
        }

        body {
            background-color: var(--bg-color);
            color: var(--text-main);
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            margin: 0;
            padding: 40px 20px;
            display: flex;
            flex-direction: column;
            align-items: center;
        }

        .content-wrapper {
            width: 100%;
            max-width: 900px;
        }

        h1 {
            color: white;
            margin-bottom: 5px;
        }

        p.description {
            color: #8b949e;
            line-height: 1.6;
            margin-bottom: 20px;
        }

        /* The wrapper that will be pushed to fullscreen */
        .game-wrapper {
            position: relative;
            width: 100%;
            aspect-ratio: 16 / 9;
            background-color: #000;
            border: 1px solid #30363d;
            border-radius: 8px;
            overflow: hidden;
            margin-bottom: 20px;
        }

        iframe {
            width: 100%;
            height: 100%;
            border: none;
            display: block;
        }

        .controls {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 20px;
        }

        .btn {
            padding: 10px 20px;
            background-color: transparent;
            color: var(--neon-blue);
            border: 1px solid var(--neon-blue);
            border-radius: 6px;
            text-decoration: none;
            font-weight: bold;
            cursor: pointer;
            transition: all 0.2s ease;
        }

        .btn:hover {
            background-color: var(--neon-blue);
            color: var(--bg-color);
            box-shadow: 0 0 15px rgba(88, 166, 255, 0.4);
        }

        .btn-fullscreen {
            color: var(--neon-green);
            border-color: var(--neon-green);
        }

        .btn-fullscreen:hover {
            background-color: var(--neon-green);
            color: var(--bg-color);
            box-shadow: 0 0 15px rgba(63, 185, 80, 0.4);
        }

        /* Mobile Exit Button - Only visible when wrapper is in fullscreen */
        .exit-fullscreen-btn {
            display: none;
            position: absolute;
            top: 15px;
            right: 15px;
            z-index: 9999;
            background-color: rgba(0, 0, 0, 0.7);
            color: white;
            border: 1px solid white;
            padding: 12px 20px;
            border-radius: 8px;
            font-weight: bold;
            cursor: pointer;
        }

        /* CSS pseudo-classes to detect fullscreen state */
        .game-wrapper:fullscreen .exit-fullscreen-btn { display: block; }
        .game-wrapper:-webkit-full-screen .exit-fullscreen-btn { display: block; }
        .game-wrapper:-ms-fullscreen .exit-fullscreen-btn { display: block; }
    </style>
</head>
<body>

    <div class="content-wrapper">
        <div class="controls">
            <a href="index.html" class="btn">← Back to Portfolio</a>
            <button class="btn btn-fullscreen" onclick="openFullscreen()">⛶ Fullscreen</button>
        </div>

        <h1 id="game-title">Loading...</h1>
        <p class="description" id="game-desc">Please wait while the game data is retrieved.</p>

        <!-- Game Container -->
        <div class="game-wrapper" id="game-container">
            <!-- Mobile exit button injected inside the wrapper so it comes along to fullscreen -->
            <button class="exit-fullscreen-btn" onclick="closeFullscreen()">Exit Fullscreen ✖</button>
            
            <iframe id="game-iframe" src="" title="Game Player"></iframe>
        </div>
    </div>

    <script>
        // 1. Define game data here
        const games = {
            "neonpong": {
                title: "Neon Pong",
                description: "The \"Hello World\" of physics. A juiced-up arcade classic focusing on rigid bodies, collision signals, and basic game loops in Godot.",
                src: "NeonPong/NeonPong.html"
            },
            "gobunny": {
                title: "GoBunny",
                description: "An endless runner featuring procedural obstacle generation, global audio buses, and an encrypted data save system.",
                src: "GoBunny/GoBunny.html"
            },
            "spaceshooter": {
                title: "SpaceShooter",
                description: "A top-down survival arena shooter. Survive endless enemy waves in a glitchy, neon-grid simulation and defeat the master control unit.",
                src: "SpaceShooter/SpaceShooter.html"
            }
        };

        // 2. Extract the '?game=xxxx' parameter from the URL
        const urlParams = new URLSearchParams(window.location.search);
        const gameId = urlParams.get('game');

        // 3. Populate the page dynamically
        const gameData = games[gameId];

        if (gameData) {
            document.title = `Play ${gameData.title} | NodeNomad`;
            document.getElementById('game-title').textContent = gameData.title;
            document.getElementById('game-desc').textContent = gameData.description;
            document.getElementById('game-iframe').src = gameData.src;
        } else {
            document.getElementById('game-title').textContent = "Game Not Found";
            document.getElementById('game-desc').textContent = "Please return to the portfolio and select a valid game.";
            document.getElementById('game-iframe').style.display = "none";
            document.querySelector('.btn-fullscreen').style.display = "none";
        }

        // 4. Fullscreen Logic
        const gameContainer = document.getElementById('game-container');

        function openFullscreen() {
            if (gameContainer.requestFullscreen) {
                gameContainer.requestFullscreen();
            } else if (gameContainer.webkitRequestFullscreen) { /* Safari */
                gameContainer.webkitRequestFullscreen();
            } else if (gameContainer.msRequestFullscreen) { /* IE11 */
                gameContainer.msRequestFullscreen();
            }
        }

        function closeFullscreen() {
            if (document.exitFullscreen) {
                document.exitFullscreen();
            } else if (document.webkitExitFullscreen) { /* Safari */
                document.webkitExitFullscreen();
            } else if (document.msExitFullscreen) { /* IE11 */
                document.msExitFullscreen();
            }
        }
    </script>
</body>
</html>
