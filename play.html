<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Playing Game | NodeNomad</title>
    <style>
        :root {
            --bg-base: #090c10;
            --bg-surface: #161b22;
            --text-main: #c9d1d9;
            --text-muted: #8b949e;
            --border-color: #30363d;
            --neon-blue: #58a6ff;
        }

        * {
            box-sizing: border-box;
            margin: 0;
            padding: 0;
        }

        body {
            background-color: var(--bg-base);
            color: var(--text-main);
            font-family: 'Segoe UI', system-ui, -apple-system, sans-serif;
            line-height: 1.6;
            min-height: 100vh;
            display: flex;
            flex-direction: column;
            align-items: center;
            background-image: 
                linear-gradient(rgba(88, 166, 255, 0.05) 1px, transparent 1px),
                linear-gradient(90deg, rgba(88, 166, 255, 0.05) 1px, transparent 1px);
            background-size: 40px 40px;
            background-position: center center;
            animation: gridMove 20s linear infinite;
        }

        @keyframes gridMove {
            0% { background-position: 0 0; }
            100% { background-position: 40px 40px; }
        }

        main {
            width: 100%;
            max-width: 1000px;
            padding: 40px 20px 80px;
            flex: 1;
            position: relative;
            z-index: 10;
        }

        .player-controls {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 20px;
        }

        .btn {
            padding: 10px 20px;
            border-radius: 6px;
            text-decoration: none;
            font-weight: 600;
            text-align: center;
            transition: all 0.2s ease;
            cursor: pointer;
            background: rgba(255, 255, 255, 0.03);
            font-size: 0.9rem;
        }

        .btn-back {
            color: var(--text-main);
            border: 1px solid var(--border-color);
            display: inline-flex;
            align-items: center;
            gap: 8px;
        }
        
        .btn-back:hover {
            background: var(--text-main);
            color: var(--bg-base);
        }

        .btn-fullscreen {
            color: var(--neon-blue);
            border: 1px solid var(--neon-blue);
        }

        .btn-fullscreen:hover {
            background-color: var(--neon-blue);
            color: #000;
            box-shadow: 0 0 15px rgba(88, 166, 255, 0.4);
        }

        .player-header h2 {
            color: white;
            font-size: 2rem;
            margin-bottom: 5px;
        }

        .player-header p {
            color: var(--text-muted);
            margin-bottom: 20px;
        }

        .game-wrapper {
            position: relative;
            width: 100%;
            aspect-ratio: 16 / 9;
            background-color: #000;
            border: 1px solid var(--border-color);
            border-radius: 8px;
            overflow: hidden;
            box-shadow: 0 20px 50px rgba(0,0,0,0.8);
        }

        iframe {
            width: 100%;
            height: 100%;
            border: none;
            display: block;
        }

        .exit-fullscreen-btn {
            display: none;
            position: absolute;
            top: 20px;
            right: 20px;
            z-index: 9999;
            background-color: rgba(0, 0, 0, 0.8);
            color: white;
            border: 1px solid var(--border-color);
            padding: 10px 20px;
            border-radius: 6px;
            font-weight: bold;
            cursor: pointer;
            transition: background 0.2s;
        }
        
        .exit-fullscreen-btn:hover {
            background-color: #f85149;
            border-color: #f85149;
        }

        .game-wrapper:fullscreen .exit-fullscreen-btn,
        .game-wrapper:-webkit-full-screen .exit-fullscreen-btn,
        .game-wrapper:-ms-fullscreen .exit-fullscreen-btn { 
            display: block; 
        }
    </style>
</head>
<body>

    <main id="player-view">
        <div class="player-controls">
            <a href="index.html" class="btn btn-back">
                <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="m15 18-6-6 6-6"/></svg>
                Back to Projects
            </a>
            <button onclick="openFullscreen()" class="btn btn-fullscreen">⛶ Fullscreen</button>
        </div>

        <div class="player-header">
            <h2 id="current-game-title">Loading...</h2>
            <p id="current-game-desc">Please wait.</p>
        </div>

        <div class="game-wrapper" id="game-container">
            <button class="exit-fullscreen-btn" onclick="closeFullscreen()">Exit Fullscreen ✖</button>
            <iframe id="game-iframe" src="" title="Game Player"></iframe>
        </div>
    </main>

    <script>
        // Database
        const games = {
            "neonpong": {
                title: "Neon-Pong",
                description: "The \"Hello World\" of physics. A juiced-up arcade classic focusing on rigid bodies, collision signals, and basic game loops in Godot.",
                src: "NeonPong/NeonPong.html"
            },
            "gobunny": {
                title: "GoBunny",
                description: "An endless runner featuring procedural obstacle generation, global audio buses, and an encrypted data save system.",
                src: "GoBunny/GoBunny.html"
            },
            "spaceshooter": {
                title: "SpaceShooter (Work In Progress)",
                description: "A top-down survival space shooter. Survive 100 enemy waves in a roguelike setup and defeat the master control unit.",
                src: "SpaceShooter/SpaceShooter.html"
            }
        };

        // Load specific game from URL parameter
        const urlParams = new URLSearchParams(window.location.search);
        const gameId = urlParams.get('game');
        
        if (games[gameId]) {
            document.getElementById('current-game-title').textContent = games[gameId].title;
            document.getElementById('current-game-desc').textContent = games[gameId].description;
            document.getElementById('game-iframe').src = games[gameId].src;
        } else {
            // Redirect to home if game is not found
            window.location.href = 'index.html';
        }

        // Handle Fullscreen
        const gameContainer = document.getElementById('game-container');
        function openFullscreen() {
            if (gameContainer.requestFullscreen) {
                gameContainer.requestFullscreen();
            } else if (gameContainer.webkitRequestFullscreen) {
                gameContainer.webkitRequestFullscreen();
            } else if (gameContainer.msRequestFullscreen) {
                gameContainer.msRequestFullscreen();
            }
        }

        function closeFullscreen() {
            if (document.exitFullscreen) {
                document.exitFullscreen();
            } else if (document.webkitExitFullscreen) {
                document.webkitExitFullscreen();
            } else if (document.msExitFullscreen) {
                document.msExitFullscreen();
            }
        }

        // Listen for "Quit" message from Godot iframe
        window.addEventListener('message', function(event) {
            if (event.data === 'quit_game') {
                window.location.href = 'index.html';
            }
        });
    </script>
</body>
</html>
